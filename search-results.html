<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results | SubmissionHub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo"><i class="fas fa-rocket"></i> SubmissionHub</a>
                <div class="nav-links">
                    <div style="position:relative; width: 300px;">
                        <i class="fas fa-search search-icon" style="left: 0.8rem; font-size: 0.8rem;"></i>
                        <input type="text" class="search-input" placeholder="Search..." style="padding: 0.5rem 0.5rem 0.5rem 2rem; font-size: 0.9rem;" value="Modern Desk">
                    </div>
                    <a href="dashboard.html">Dashboard</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 3rem;">
        <div style="margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem;">Search Results for "Modern Desk"</h1>
            <p style="color: var(--text-muted);">Showing 4 items</p>
        </div>

        <div class="grid">
            <div class="card" onclick="navigateTo('item-detail.html')" style="cursor:pointer">
                <img src="https://images.unsplash.com/photo-1493934558415-9d19f0b2b4d2?auto=format&fit=crop&w=400" class="card-img">
                <div class="card-content">
                    <span class="badge badge-type-a">Workspace</span>
                    <h3 style="margin-top:0.5rem">Modern Desk Setup</h3>
                    <p style="color:var(--text-muted); font-size: 0.85rem; margin-top: 0.5rem;">Premium wooden desk with minimalist cable management.</p>
                </div>
            </div>
            <!-- Repeated cards for demonstration -->
            <div class="card" onclick="navigateTo('item-detail.html')" style="cursor:pointer">
                <img src="https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&w=400" class="card-img">
                <div class="card-content">
                    <span class="badge badge-type-b">Furniture</span>
                    <h3 style="margin-top:0.5rem">Standing Desk XL</h3>
                    <p style="color:var(--text-muted); font-size: 0.85rem; margin-top: 0.5rem;">Electric height adjustment with memory presets.</p>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
