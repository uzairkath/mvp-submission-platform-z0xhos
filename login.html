<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | SubmissionHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="display:flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="color: var(--primary); font-size: 1.5rem; margin-bottom: 0.5rem;">SubmissionHub</h2>
            <p style="color: var(--text-muted);">Sign in to your account</p>
        </div>
        <form onsubmit="event.preventDefault(); navigateTo('dashboard.html')">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding: 0.8rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="#" style="color: var(--primary); font-weight: 600;">Sign up</a>
        </p>
    </div>
</body>
</html>
